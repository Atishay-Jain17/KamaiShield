<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 76" fill="none">
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e88e5"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <!-- Kamai — green, ends around x=248 at font-size 62 -->
  <text
    x="4" y="58"
    font-family="Arial, Helvetica, sans-serif"
    font-size="62"
    font-weight="900"
    fill="url(#greenGrad)"
    letter-spacing="-1"
  >Kamai</text>
  <!-- Shield — blue, starts right after Kamai -->
  <text
    x="256" y="58"
    font-family="Arial, Helvetica, sans-serif"
    font-size="62"
    font-weight="900"
    fill="url(#blueGrad)"
    letter-spacing="-1"
  >Shield</text>
</svg>
